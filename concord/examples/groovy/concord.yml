configuration:
  dependencies:
  - "mvn://org.apache.groovy:groovy-all:pom:5.0.4"

flows:
  default:
  - script: groovy
    body: |
      execution.setVariable("x", 123)

  - script: groovy
    body: |
      // variables can be accessed via the context
      println execution.getVariable("x")

      // ...or used directly
      println x

